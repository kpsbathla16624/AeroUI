name: aero_ui
description: >
  AeroUI — A modern Flutter UI component library featuring glass, gradient, and solid design styles. 
  Includes buttons, text fields, loaders, dropdowns, and more.

version: 0.0.1
homepage: https://github.com/kpsbathla16624/AeroUI
repository: https://github.com/kpsbathla16624/AeroUI
issue_tracker: https://github.com/kpsbathla16624/AeroUI/issues
topics:
  - flutter
  - ui
  - components
  - design
  - aeroui

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  file_picker: ^10.3.3
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true

  # Uncomment when adding assets or fonts
  # assets:
  #   - assets/

  # fonts:
  #   - family: AeroFont
  #     fonts:
  #       - asset: assets/fonts/AeroFont-Regular.ttf
